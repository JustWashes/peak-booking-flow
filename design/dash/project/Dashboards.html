<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JustWashes · Dashboards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="onboarding.css">
<style>
  html, body { margin: 0; padding: 0; background: #EEF1F5; font-family: 'Inter', sans-serif; }
  .dc-artboard-inner { background: #F3F5F8; }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="availability-calendar.jsx"></script>

<div id="canvas-root"></div>

<script type="text/babel" data-presets="react">
function CanvasApp() {
  const DC = window.DesignCanvas, S = window.DCSection, A = window.DCArtboard;
  return (
    <DC title="JustWashes · Dashboards" subtitle="Customer and Technician hi-fi prototypes. Click any artboard to focus; both are fully interactive.">
      <S id="customer" title="Customer Dashboard" description="The homeowner's home. Active wash tracker, credits, billing, and bookings.">
        <A id="customer-home" label="Customer · Home (1440 × 1120)" width={1440} height={1120}>
          <div id="customer-root" style={{ width: '100%', height: '100%' }} data-screen-label="Customer Dashboard"></div>
        </A>
      </S>

      <S id="book-wash" title="Customer · Book a Wash" description="Credit-based booking — Vehicle → Technician type (Certified vs Independent, with i-popover and option to pick a specific pro) → Date & Time (availability filtered by tech type) → Review. Exterior-only, paid in credits. Demo link in the gate flips into the full flow.">
        <A id="book-wash-home" label="Book a Wash · Full Flow (1440 × 1240)" width={1440} height={1240}>
          <div id="book-root" style={{ width: '100%', height: '100%' }} data-screen-label="Book a Wash"></div>
        </A>
        <A id="book-wash-nosub" label="Book a Wash · No subscription (1440 × 720)" width={1440} height={720}>
          <div id="book-nosub-root" style={{ width: '100%', height: '100%' }} data-screen-label="Book a Wash · No subscription"></div>
        </A>
      </S>

      <S id="technician" title="Technician Dashboard" description="The pro's cockpit. Next job, schedule, earnings.">
        <A id="tech-home" label="Technician · Home (1440 × 1320)" width={1440} height={1320}>
          <div id="tech-root" style={{ width: '100%', height: '100%' }} data-screen-label="Technician Dashboard"></div>
        </A>
      </S>

      <S id="bookings" title="Bookings & Calendar" description="Interactive month calendar, per-day details, and status modules for every booking — upcoming, completed, cancelled, rescheduled, and needs review.">
        <A id="bookings-home" label="Bookings & Calendar (1440 × 1420)" width={1440} height={1420}>
          <div id="bookings-root" style={{ width: '100%', height: '100%' }} data-screen-label="Bookings & Calendar"></div>
        </A>
      </S>

      <S id="availability" title="Manage Availability" description="Post-onboarding availability management. Weekly defaults tab + month calendar view with per-day overrides, plus reset-to-defaults and clear-overrides actions.">
        <A id="availability-home" label="Manage Availability (1440 × 1200)" width={1440} height={1200}>
          <div id="availability-root" style={{ width: '100%', height: '100%' }} data-screen-label="Manage Availability"></div>
        </A>
      </S>

      <S id="technician-onboarding" title="Technician Dashboard · Onboarding" description="Same shell, but tuned for techs who haven't finished onboarding — checklist front and center, jobs and earnings locked.">
        <A id="tech-onboarding" label="Technician · Onboarding Dashboard (1440 × 1320)" width={1440} height={1320}>
          <div id="tech-onboarding-root" style={{ width: '100%', height: '100%' }} data-screen-label="Technician Dashboard (Onboarding)"></div>
        </A>
      </S>

      <S id="onboarding-flow" title="Onboarding Flow" description="The full multi-step onboarding experience — 8 interactive steps with forms, animated training modules, availability grid, and a celebration finish.">
        <A id="onboarding-home" label="Onboarding · Full Flow (1440 × 960)" width={1440} height={960}>
          <div id="onboarding-root" style={{ width: '100%', height: '100%' }} data-screen-label="Onboarding Flow"></div>
        </A>
      </S>
    </DC>
  );
}

ReactDOM.createRoot(document.getElementById('canvas-root')).render(<CanvasApp />);
</script>

<script type="text/babel" src="customer-dashboard.jsx"></script>
<script type="text/babel" src="book-wash.jsx"></script>
<script type="text/babel" src="technician-dashboard.jsx"></script>
<script type="text/babel" src="bookings.jsx"></script>
<script type="text/babel" src="manage-availability.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>

</body>
</html>
